<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoL Draft</title>

<style>
body { margin:0; background:#050b1a; color:white; font-family:Arial; }
.container { display:flex; height:100vh; }

.team { width:25%; padding:10px; }
.blue { background:#0a1a3f; }
.red { background:#3f0a0a; }

.center { width:50%; text-align:center; }

.champ img {
    width:60px; margin:5px;
    border-radius:8px; cursor:pointer;
}
.champ:hover img { transform:scale(1.2); border:2px solid gold; }

#timer { font-size:40px; }
.danger { color:red; }

.team img { width:60px; margin:5px; }
</style>
</head>

<body>

<div class="container">

<div class="team blue">
<h2>BLUE</h2>
{% for p in teamA %}
<p>{{p.player.name}} ({{p.role}})</p>
{% endfor %}
<div id="bluePicks"></div>
<div id="blueBan"></div>
</div>

<div class="center">

<h1>LoL Draft</h1>
<h2 id="phase"></h2>
<h3 id="current"></h3>
<h2 id="timer">30</h2>

<ul id="log"></ul>

<div id="champions">
{% for c in champions %}
<div class="champ" onclick="selectChamp(this)">
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{c}}.png" alt="{{c}}">
</div>
{% endfor %}
</div>

</div>

<div class="team red">
<h2>RED</h2>
{% for p in teamB %}
<p>{{p.player.name}} ({{p.role}})</p>
{% endfor %}
<div id="redPicks"></div>
<div id="redBan"></div>
</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
const sequence = [
"blue-ban","red-ban","blue-ban","red-ban",
"blue-pick","red-pick","red-pick","blue-pick",
"blue-pick","red-pick","red-pick","blue-pick"
];

let turn=0, timer=null, timeLeft=30;

function getStep(){return sequence[turn];}
function getTeam(){return getStep().split("-")[0];}
function isBan(){return getStep().includes("ban");}

function update(){
document.getElementById("phase").textContent=isBan()?"BAN":"PICK";
document.getElementById("current").textContent=getTeam().toUpperCase();
startTimer();
}

function startTimer(){
clearInterval(timer);
timeLeft=30;
timer=setInterval(()=>{
timeLeft--;
let el=document.getElementById("timer");
el.textContent=timeLeft;
if(timeLeft<=5) el.classList.add("danger");
if(timeLeft<=0){clearInterval(timer);turn++;update();}
},1000);
}

function selectChamp(el){
clearInterval(timer);
document.getElementById("sound").play();

let champ=el.querySelector("img").alt;
let team=getTeam();

let img=document.createElement("img");
img.src=el.querySelector("img").src;

if(isBan()){
document.getElementById(team+"Ban").appendChild(img);
el.style.opacity=0.3;
}else{
document.getElementById(team+"Picks").appendChild(img);
el.remove();
}

turn++;
if(turn<sequence.length) update();
else alert("ドラフト終了");
}

update();
</script>

</body>
</html>
