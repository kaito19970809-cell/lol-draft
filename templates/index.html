<!DOCTYPE html>
<html>
<head>
    <title>LoL Draft Tool</title>
    <style>
        body {
            background: #0b1420;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .champ-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .champ {
            margin: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .champ:hover {
            transform: scale(1.1);
        }

        img {
            width: 80px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }

        button {
            padding: 8px;
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>LoL Draft Tool</h1>

<!-- 設定 -->
<div>
    <h3>プレイヤー名（カンマ区切り）</h3>
    <input id="playerInput" value="P1,P2,P3,P4,P5,P6,P7,P8,P9,P10" size="50">

    <br>

    <label>
        <input type="checkbox" id="snakeToggle" checked>
        スネーク順
    </label>

    <br>

    <label>
        ピック数:
        <input type="number" id="pickCount" value="20" min="1">
    </label>

    <br>

    <button onclick="startDraft()">ドラフト開始</button>
</div>

<hr>

<h2>現在のターン: <span id="currentPlayer">-</span></h2>

<h2>ピック履歴</h2>
<ul id="picked"></ul>

<div id="champions" class="champ-grid">
    {% for champ in champions %}
        <div class="champ" onclick="pick(this)">
            <img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{ champ }}.png">
            <p>{{ champ }}</p>
        </div>
    {% endfor %}
</div>

<script>
let players = [];
let order = [];
let turn = 0;

function startDraft() {
    const input = document.getElementById("playerInput").value;
    players = input.split(",").map(p => p.trim());

    const snake = document.getElementById("snakeToggle").checked;
    const pickCount = parseInt(document.getElementById("pickCount").value);

    order = [];

    if (snake) {
        let forward = [...Array(players.length).keys()];
        let backward = [...forward].reverse();
        let full = forward.concat(backward);

        for (let i = 0; i < pickCount; i++) {
            order.push(full[i % full.length]);
        }
    } else {
        for (let i = 0; i < pickCount; i++) {
            order.push(i % players.length);
        }
    }

    turn = 0;
    document.getElementById("picked").innerHTML = "";
    document.getElementById("currentPlayer").textContent = players[order[0]];
}

function pick(element) {
    if (turn >= order.length) return;

    const champ = element.querySelector("p").innerText;
    const player = players[order[turn]];

    const li = document.createElement("li");
    li.textContent = player + " → " + champ;
    document.getElementById("picked").appendChild(li);

    element.remove();

    turn++;

    if (turn < order.length) {
        document.getElementById("currentPlayer").textContent = players[order[turn]];
    } else {
        document.getElementById("currentPlayer").textContent = "終了";
    }
}
</script>

</body>
</html>
