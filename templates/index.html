<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoL Draft</title>

<style>
body {
    margin: 0;
    background: #0a1428;
    color: white;
    font-family: Arial;
}

/* レイアウト */
.main {
    display: flex;
    height: 100vh;
}

/* サイド */
.side {
    width: 20%;
    padding: 10px;
    box-sizing: border-box;
}

.blue {
    background: linear-gradient(#0a1a3f, #050b1a);
    border-right: 3px solid #00c8ff;
}

.red {
    background: linear-gradient(#3f0a0a, #1a0505);
    border-left: 3px solid #ff3c3c;
}

/* 中央 */
.center {
    width: 60%;
    text-align: center;
    position: relative;
}

/* タイトル */
h1 {
    color: gold;
    margin: 10px;
}

/* タイマー */
#timer {
    font-size: 50px;
    margin: 10px;
    transition: 0.3s;
}

.low {
    color: red;
    animation: blink 0.5s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* チャンピオン */
#champions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
}

.champ img {
    width: 60px;
    margin: 4px;
    border-radius: 8px;
    border: 2px solid #333;
    cursor: pointer;
    transition: 0.2s;
}

.champ img:hover {
    transform: scale(1.15);
    border-color: gold;
    box-shadow: 0 0 10px gold;
}

/* BAN */
.ban img {
    width: 40px;
    opacity: 0.4;
    margin: 3px;
}

/* PICK */
.pick img {
    width: 70px;
    margin: 5px;
}

/* 見出し */
.team-title {
    text-align: center;
    font-size: 20px;
    margin-bottom: 10px;
}

/* ターン表示 */
#turnText {
    font-size: 20px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="main">

<!-- BLUE -->
<div class="side blue">
    <div class="team-title">BLUE</div>

    <div>Ban</div>
    <div id="blue-ban" class="ban"></div>

    <hr>

    <div>Pick</div>
    <div id="blue-pick" class="pick"></div>
</div>

<!-- CENTER -->
<div class="center">

    <h1>LoL Draft</h1>

    <div id="phase">BAN PHASE</div>
    <div id="turnText">BLUE TURN</div>

    <div id="timer">30</div>

    <div id="champions">
        {% for champ in champions %}
        <div class="champ" onclick="pick(this)">
            <img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{ champ }}.png" alt="{{ champ }}">
        </div>
        {% endfor %}
    </div>

</div>

<!-- RED -->
<div class="side red">
    <div class="team-title">RED</div>

    <div>Ban</div>
    <div id="red-ban" class="ban"></div>

    <hr>

    <div>Pick</div>
    <div id="red-pick" class="pick"></div>
</div>

</div>

<script>
// 🔊 ピック音
const pickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

// フェーズ
let phase = "ban";

// ターン順（BAN→PICK）
const order = [
    "blue","red","red","blue","blue","red",
    "blue","red","red","blue","blue","red"
];

let turn = 0;
let time = 30;
let timer;

// タイマー開始
function startTimer() {
    clearInterval(timer);
    time = 30;

    timer = setInterval(() => {
        time--;
        const t = document.getElementById("timer");
        t.textContent = time;

        if (time <= 5) {
            t.classList.add("low");
        } else {
            t.classList.remove("low");
        }

        if (time <= 0) {
            clearInterval(timer);
        }
    }, 1000);
}

// 初期
startTimer();

function pick(el) {
    const champ = el.querySelector("img").alt;
    const team = order[turn];

    pickSound.play();

    if (phase === "ban") {
        document.getElementById(team + "-ban")
            .innerHTML += `<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${champ}.png">`;
    } else {
        document.getElementById(team + "-pick")
            .innerHTML += `<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${champ}.png">`;
    }

    el.remove();
    turn++;

    // BAN→PICK切替
    if (turn === 6) {
        phase = "pick";
        document.getElementById("phase").textContent = "PICK PHASE";
    }

    updateTurn();
    startTimer();
}

function updateTurn() {
    if (turn >= order.length) {
        document.getElementById("turnText").textContent = "FINISH";
        return;
    }

    document.getElementById("turnText").textContent =
        order[turn].toUpperCase() + " TURN";
}
</script>

</body>
</html>
