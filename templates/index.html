<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Segoe UI}
.container{display:flex;height:100vh}
.team{width:20%;padding:10px}
.blue{background:#0f2a44}
.red{background:#441010}
.center{width:60%;text-align:center}

.player{background:#111;margin:6px;padding:6px;border-left:4px solid gold}
.active{box-shadow:0 0 10px gold}

.pack{display:grid;grid-template-columns:repeat(5,80px);gap:10px;margin-top:20px}
.pack img{width:80px;border-radius:10px;cursor:pointer}

#timerCircle{
width:100px;height:100px;border-radius:50%;
border:6px solid gold;margin:auto;
display:flex;align-items:center;justify-content:center;font-size:30px
}
.low{border-color:red;color:red;animation:blink .5s infinite}
@keyframes blink{50%{opacity:.3}}
</style>
</head>

<body>
<div class="container">

<div class="team blue"><h2>BLUE</h2><div id="blue"></div></div>

<div class="center">
<h1>Draft</h1>
<div id="turn"></div>

<div id="timerCircle"><span id="timerText"></span></div>

<div id="pack" class="pack"></div>
</div>

<div class="team red"><h2>RED</h2><div id="red"></div></div>

</div>

<script>
const socket=io();
const myName=prompt("名前");

let state={};
let players={{players|tojson}};

function currentPlayer(){
    return players[state.turn%players.length];
}

function renderChamps(list){
    let html="";
    for(let i=0;i<3;i++){
        if(list[i]){
            html+=`<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${list[i]}.png" width=40>`
        }else{
            html+=`<div style="width:40px;height:40px;background:#222;display:inline-block"></div>`
        }
    }
    return html;
}

function renderTeams(){
    const roles=["TOP","JG","MID","ADC","SUP"];
    let b="",r="";

    roles.forEach(role=>{
        const bp=state.teams.blue[role];
        const rp=state.teams.red[role];

        const bPick=state.picks[bp.player]||[];
        const rPick=state.picks[rp.player]||[];

        b+=`<div class="player ${bp.player===currentPlayer()?'active':''}">
        <b>${role}</b><br>${bp.player} (${bp.power})<br>
        ${renderChamps(bPick)}</div>`;

        r+=`<div class="player ${rp.player===currentPlayer()?'active':''}">
        <b>${role}</b><br>${rp.player} (${rp.power})<br>
        ${renderChamps(rPick)}</div>`;
    });

    document.getElementById("blue").innerHTML=b;
    document.getElementById("red").innerHTML=r;
}

function render(){
    document.getElementById("turn").textContent="TURN: "+currentPlayer();

    const pack=document.getElementById("pack");
    pack.innerHTML="";

    (state.packs[myName]||[]).forEach(c=>{
        const img=document.createElement("img");
        img.src=`https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${c}.png`;
        img.onclick=()=>pick(c);
        pack.appendChild(img);
    });

    document.getElementById("timerText").textContent=state.time;

    if(state.time<=5){
        document.getElementById("timerCircle").classList.add("low");
    }else{
        document.getElementById("timerCircle").classList.remove("low");
    }

    renderTeams();
}

function pick(c){
    if(myName!==currentPlayer()){
        alert("あなたのターンじゃない");
        return;
    }
    new Audio("/static/pick.mp3").play();
    socket.emit("pick",{player:myName,champ:c});
}

socket.on("state",s=>{
    state=s;
    render();
});
</script>

</body>
</html>
