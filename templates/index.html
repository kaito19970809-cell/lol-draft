<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoLドラフト</title>

<style>
body {
    background:#0a0f1a;
    color:white;
    text-align:center;
}

.card {
    width:100px;
    height:140px;
    border-radius:10px;
    overflow:hidden;
    border:2px solid #333;
    cursor:pointer;
    transition:0.2s;
}

.card:hover {
    transform:scale(1.1);
    border-color:gold;
}

.disabled {
    pointer-events:none;
    opacity:0.4;
}

.blue-turn {color:#4da6ff;}
.red-turn {color:#ff4d4d;}

.active {
    background:yellow;
    color:black;
    padding:2px 6px;
    border-radius:5px;
}
</style>
</head>

<body>

<h1>LoLドラフト</h1>

<h2 id="turnText"></h2>
<div>ラウンド: <span id="round"></span></div>
<div>残り時間: <span id="timer"></span></div>

<div id="orders"></div>

<h2>パック</h2>
<div id="pack" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;"></div>

<h2>ブルー</h2>
<div id="blue"></div>

<h2>レッド</h2>
<div id="red"></div>

<br>
<button onclick="reset()">リセット</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();
const ROLE = "{{ role }}";

const orders = [
 ["blue","red","red","blue","blue","red","red","blue","blue","red"],
 ["red","blue","blue","red","red","blue","blue","red","red","blue"],
 ["blue","red","blue","red","blue","red","blue","red","blue","red"]
];

function imgUrl(name){
 return `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${name}.png`;
}

function pick(champ, current){
 if(ROLE !== current){
     alert("あなたのターンではありません");
     return;
 }

 if(!confirm(champ + " をピックしますか？")){
     return;
 }

 socket.emit("pick",{role:ROLE, champ:champ});
}

function reset(){
 fetch("/reset");
}

function renderOrders(round, turn){
 const div = document.getElementById("orders");
 div.innerHTML = "";

 orders.forEach((ord, r)=>{
     let html = `<div>第${r+1}パック：`;

     ord.forEach((p,i)=>{
         let cls = "";
         if(r === round-1 && i === turn){
             cls = "active";
         }

         html += `<span class="${cls}">${p==="blue"?"青":"赤"}</span> `;
     });

     html += "</div>";
     div.innerHTML += html;
 });
}

function render(state){

 document.getElementById("round").innerText = state.round;
 document.getElementById("timer").innerText = state.time;

 const current = orders[state.round-1][state.turn];

 const turnText = document.getElementById("turnText");
 turnText.innerText = current === "blue" ? "ブルーのターン" : "レッドのターン";
 turnText.className = current === "blue" ? "blue-turn" : "red-turn";

 renderOrders(state.round, state.turn);

 const packDiv = document.getElementById("pack");
 packDiv.innerHTML = "";

 state.pack.forEach(champ=>{
     const div = document.createElement("div");
     div.className = "card";

     if(ROLE !== current){
         div.classList.add("disabled");
     }

     div.innerHTML = `<img src="${imgUrl(champ)}" width="100%" height="100%">`;

     div.onclick = ()=>pick(champ, current);

     packDiv.appendChild(div);
 });

 document.getElementById("blue").innerText = state.picks.blue.join(", ");
 document.getElementById("red").innerText = state.picks.red.join(", ");
}

socket.on("state", render);
</script>

</body>
</html>
