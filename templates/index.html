<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoL Draft Tool</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #0a1a3f, #050b1a);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { color: gold; }

#champions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.champ img {
    width: 70px;
    margin: 5px;
    border-radius: 8px;
    border: 2px solid #333;
}

.champ:hover img {
    border-color: gold;
    transform: scale(1.1);
}

.player-box {
    display: inline-block;
    background: #111;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
}

</style>
</head>

<body>

<h1>LoL Draft Tool（BANあり）</h1>

<h2 id="phase">BANフェーズ</h2>
<h2 id="current"></h2>

<ul id="log"></ul>

<div id="champions">
{% for champ in champions %}
<div class="champ" onclick="selectChamp(this)">
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{ champ }}.png" alt="{{ champ }}">
</div>
{% endfor %}
</div>

<div id="result"></div>

<script>
/* ===== チーム ===== */
const teams = {
    blue: [
        {% for p in teamA %}
        "{{ p.player.name }}",
        {% endfor %}
    ],
    red: [
        {% for p in teamB %}
        "{{ p.player.name }}",
        {% endfor %}
    ]
};

/* ===== BAN → PICK 順 ===== */
const sequence = [
    "blue-ban","red-ban","blue-ban","red-ban",
    "blue-pick","red-pick","red-pick","blue-pick","blue-pick",
    "red-pick","red-pick","blue-pick"
];

let turn = 0;

let playerPicks = {};
Object.values(teams).flat().forEach(p => playerPicks[p] = []);

let bans = [];

/* ===== 現在 ===== */
function getStep() {
    return sequence[turn];
}

function getTeam() {
    return getStep().split("-")[0];
}

function isBan() {
    return getStep().includes("ban");
}

function getPlayer() {
    const team = getTeam();
    const count = sequence.slice(0, turn).filter(s => s === team+"-pick").length;
    return teams[team][count];
}

/* ===== 表示 ===== */
function update() {
    document.getElementById("phase").textContent =
        isBan() ? "BANフェーズ" : "PICKフェーズ";

    document.getElementById("current").textContent =
        getTeam().toUpperCase() + (isBan() ? " BAN" : " PICK");
}

update();

/* ===== 選択 ===== */
function selectChamp(el) {
    const champ = el.querySelector("img").alt;
    const team = getTeam();

    const li = document.createElement("li");

    if (isBan()) {
        bans.push(champ);
        li.textContent = team.toUpperCase() + " BAN → " + champ;
    } else {
        const player = getPlayer();
        playerPicks[player].push(champ);
        li.textContent = team.toUpperCase() + " PICK → " + champ;
    }

    document.getElementById("log").appendChild(li);

    el.remove();
    turn++;

    if (turn < sequence.length) {
        update();
    } else {
        finish();
    }
}

/* ===== 終了 ===== */
function finish() {
    document.getElementById("current").textContent = "終了";
    document.getElementById("champions").style.display = "none";

    const res = document.getElementById("result");
    res.innerHTML = "<h2>結果</h2>";

    for (const p in playerPicks) {
        const box = document.createElement("div");
        box.className = "player-box";

        const title = document.createElement("h3");
        title.textContent = p;
        box.appendChild(title);

        playerPicks[p].forEach(c => {
            const img = document.createElement("img");
            img.src = `https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${c}.png`;
            img.style.width = "50px";
            box.appendChild(img);
        });

        res.appendChild(box);
    }
}
</script>

</body>
</html>
