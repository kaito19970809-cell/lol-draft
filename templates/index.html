<!DOCTYPE html>
<html>
<head>
    <title>LoL Draft</title>
    <style>
        .champ {
            display: inline-block;
            padding: 10px;
            margin: 5px;
            background: lightgray;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>LoL Draft Tool</h1>

<h2>ピック履歴</h2>
<ul id="picked"></ul>

<div id="champions">
    {% for champ in champions %}
        <div class="champ" onclick="pick(this)">
            {{ champ }}
        </div>
    {% endfor %}
</div>

<script>
function pick(element) {
    const champ = element.innerText;

    // 履歴に追加
    const li = document.createElement("li");
    li.textContent = champ;
    document.getElementById("picked").appendChild(li);

    // 消す
    element.remove();
}
</script>

</body>
</html>
