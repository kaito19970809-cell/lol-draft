<script>
const socket = io();
const role = "{{ role }}";
let state = {};
let selected = null;

function img(name){
 return `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${name}.png`;
}

function start(){
 socket.emit("start", {role: role}); // ★ 修正
}

function reset(){
 socket.emit("reset");
}

socket.on("state", s=>{
 state = s;
 render();
});

function render(){
 if(!state.started){
   turn.innerText =
    "待機中 (青:" + (state.ready.blue?"OK":"待機") +
    " 赤:" + (state.ready.red?"OK":"待機") + ")";
   return;
 }

 const order = [
  ["青","赤","赤","青","青","赤","赤","青","青","赤"],
  ["赤","青","青","赤","赤","青","青","赤","赤","青"],
  ["青","赤","赤","青","青","赤","赤","青","青","赤"]
 ][state.round-1];

 const current = order[state.turn];

 turn.innerText = current + "のターン";
 round.innerText = state.round;
 time.innerText = state.time;

 const clickable =
   (role==="blue" && current==="青") ||
   (role==="red" && current==="赤");

 pack.innerHTML = "";

 state.pack.forEach(c=>{
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
   <img src="${img(c.name)}"
   onerror="this.src='https://via.placeholder.com/90x110'">
  `;

  if(!clickable){
    div.style.opacity = 0.4; // ★ 黒影削除
  }

  if(clickable){
    div.onclick = ()=>{
      if(selected === c.name){
        socket.emit("pick",{role:role, champ:c.name});
        selected = null;
      }else{
        selected = c.name;
      }
    }
  }

  pack.appendChild(div);
 });

 // picks
 ["blue","red"].forEach(team=>{
  const el = document.getElementById(team);
  el.innerHTML = "";
  state.picks[team].forEach(c=>{
    el.innerHTML += `<img src="${img(c.name)}" width="50">`;
  });
 });
}
</script>
