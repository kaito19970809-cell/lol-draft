<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{background:#0a1428;color:white;text-align:center}
.pack{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.card{width:90px;height:110px;cursor:pointer;position:relative}
.card img{width:100%;border-radius:8px}
.lock{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.6)}
.selected{outline:3px solid yellow}
</style>
</head>

<body>

<h1>LoLドラフト</h1>
<h2 id="turn"></h2>

<div>ラウンド: <span id="round"></span></div>
<div>残り時間: <span id="time"></span></div>

<button onclick="start()">スタート</button>
<button onclick="reset()">リセット</button>

<h3 id="order"></h3>

<div id="pack" class="pack"></div>

<h3>ブルー</h3>
<div id="blue"></div>

<h3>レッド</h3>
<div id="red"></div>

<script>
const socket = io();
const role = "{{ role }}";
let state = {};
let selected = null;

function img(name){
 return `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${name}.png`;
}

function start(){ socket.emit("start"); }
function reset(){ socket.emit("reset"); }

socket.on("state", s=>{
 state = s;
 render();
});

function render(){
 if(!state.started){
   turn.innerText = "待機中";
   return;
 }

 const order = [
  ["青","赤","赤","青","青","赤","赤","青","青","赤"],
  ["赤","青","青","赤","赤","青","青","赤","赤","青"],
  ["青","赤","赤","青","青","赤","赤","青","青","赤"]
 ][state.round-1];

 document.getElementById("order").innerText =
  "順番: " + order.join(" → ");

 const current = order[state.turn];
 turn.innerText = current + "のターン";

 round.innerText = state.round;
 time.innerText = state.time;

 const pack = document.getElementById("pack");
 pack.innerHTML = "";

 state.pack.forEach(c=>{
  const div = document.createElement("div");
  div.className = "card";

  if(selected === c.name){
    div.classList.add("selected");
  }

  const clickable =
    (role==="blue" && current==="青") ||
    (role==="red" && current==="赤");

  div.innerHTML = `
   <img src="${img(c.name)}"
   onerror="this.src='https://via.placeholder.com/90x110'">
   ${!clickable ? '<div class="lock"></div>' : ''}
  `;

  if(clickable){
    div.onclick = ()=>{
      if(selected === c.name){
        socket.emit("pick",{role:role, champ:c.name});
        selected = null;
      }else{
        selected = c.name;
      }
    }
  }

  pack.appendChild(div);
 });

 // picks
 ["blue","red"].forEach(team=>{
  const el = document.getElementById(team);
  el.innerHTML = "";
  state.picks[team].forEach(c=>{
    el.innerHTML += `<img src="${img(c.name)}" width="50"
    onerror="this.src='https://via.placeholder.com/50'">`;
  });
 });
}
</script>

</body>
</html>
