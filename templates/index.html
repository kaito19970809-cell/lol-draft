<!DOCTYPE html>
<html>
<head>
    <title>LoL Draft</title>
    <style>
        .champ {
            display: inline-block;
            padding: 10px;
            margin: 5px;
            background: lightgray;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>LoL Draft Tool</h1>

<div id="champions">
    {% for champ in champions %}
        <div class="champ" onclick="pick(this)">
            {{ champ }}
        </div>
    {% endfor %}
</div>

<script>
function pick(element) {
    element.remove(); // ← クリックしたら消える（重複防止）
}
</script>

</body>
</html>
