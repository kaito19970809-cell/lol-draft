<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoL Draft</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle at top, #0a1a3f, #050b1a);
    color:white;
    font-family:Arial;
}
.container {display:flex;height:100vh;}
.team {width:20%;text-align:center;padding:10px;}
.blue {background:#0a1a3f;}
.red {background:#3f0a0a;}
.center {width:60%;text-align:center;}

.champ img {
    width:70px;margin:5px;border-radius:10px;
    border:2px solid #222;cursor:pointer;
}
.champ:hover img {
    transform:scale(1.2);
    border-color:gold;
}

#timer {font-size:40px;}

.active {box-shadow:0 0 20px cyan;}
.red.active {box-shadow:0 0 20px red;}

button {
    background:gold;border:none;padding:10px;
    margin:5px;cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="team blue" id="blueTeam">
<h2>BLUE</h2>
<div id="blueBan"></div>
<div id="bluePicks"></div>
</div>

<div class="center">

<h1>LoL Draft</h1>
<h2 id="phase"></h2>
<h3 id="current"></h3>
<div id="timer">30</div>

<button onclick="undo()">UNDO</button>
<button id="confirmBtn" style="display:none;" onclick="confirmPick()">確定</button>

<div id="champions">
{% for champ in champions %}
<div class="champ" onclick="selectChamp(this)">
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{ champ }}.png" alt="{{ champ }}">
</div>
{% endfor %}
</div>

</div>

<div class="team red" id="redTeam">
<h2>RED</h2>
<div id="redBan"></div>
<div id="redPicks"></div>
</div>

</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>
const socket = io();
const ROOM_ID = "{{ room_id }}";
const KEY = new URLSearchParams(location.search).get("key");
const canControl = !!KEY;

socket.emit("join",{room:ROOM_ID});

let selectedChamp = null;
let timeLeft = 30;

socket.on("update",(state)=>{
    render(state);
});

function render(state){
    document.getElementById("phase").textContent =
        state.sequence[state.turn]?.includes("ban") ? "BAN" : "PICK";

    document.getElementById("current").textContent =
        state.sequence[state.turn]?.split("-")[0];

    highlight(state);
    draw(state);
}

function draw(state){
    updateList("bluePicks",state.bluePicks);
    updateList("redPicks",state.redPicks);
    updateList("blueBan",state.blueBan);
    updateList("redBan",state.redBan);
}

function updateList(id,list){
    const el=document.getElementById(id);
    el.innerHTML="";
    list.forEach(c=>{
        const img=document.createElement("img");
        img.src=`https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/${c}.png`;
        el.appendChild(img);
    });
}

function highlight(state){
    const team=state.sequence[state.turn]?.split("-")[0];
    document.getElementById("blueTeam").classList.remove("active");
    document.getElementById("redTeam").classList.remove("active");

    if(team==="blue"){
        document.getElementById("blueTeam").classList.add("active");
    }else{
        document.getElementById("redTeam").classList.add("active");
    }
}

function selectChamp(el){
    if(!canControl)return;

    selectedChamp=el.querySelector("img").alt;

    document.getElementById("confirmBtn").style.display="inline-block";
}

function confirmPick(){
    if(!selectedChamp)return;

    if(!confirm(selectedChamp+"でOK？"))return;

    socket.emit("action",{
        room:ROOM_ID,
        champ:selectedChamp,
        key:KEY
    });

    selectedChamp=null;
    document.getElementById("confirmBtn").style.display="none";
}

function undo(){
    socket.emit("undo",{room:ROOM_ID,key:KEY});
}
</script>

</body>
</html>
