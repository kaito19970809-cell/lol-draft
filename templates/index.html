<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
body{background:#0a1428;color:white;text-align:center;}
.card{display:inline-block;margin:5px;cursor:pointer;}
img{width:80px}
</style>
</head>

<body>

<h1>ドラフト</h1>
<h2 id="turn">待機中</h2>

<button onclick="start()">開始</button>
<button onclick="reset()">リセット</button>

<div id="pool"></div>

<h3>BLUE</h3>
<div id="blue"></div>

<h3>RED</h3>
<div id="red"></div>

<script>
const socket = io();
const role = "{{ role }}";
let state = {};

function img(champ){
 return `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${champ.image}.png`;
}

socket.on("state", s=>{
 state = s;
 render();
});

function start(){
 socket.emit("start");
}

function reset(){
 socket.emit("reset");
}

function render(){
 if(!state.started){
  document.getElementById("turn").innerText = "待機中";
  return;
 }

 const turn = state.turn % 2 === 0 ? "blue" : "red";
 document.getElementById("turn").innerText = turn + "のターン";

 const pool = document.getElementById("pool");
 pool.innerHTML = "";

 state.pool.forEach(c=>{
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `<img src="${img(c)}">`;

  if(role === turn){
   div.onclick = ()=>socket.emit("pick",{role:role, champ:c.name});
  }

  pool.appendChild(div);
 });

 ["blue","red"].forEach(t=>{
  const el = document.getElementById(t);
  el.innerHTML = "";
  state.picks[t].forEach(c=>{
   el.innerHTML += `<img src="${img(c)}">`;
  });
 });
}
</script>

</body>
</html>
