<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
body{background:#0a0f1a;color:white;text-align:center}
.card{width:100px;height:140px;margin:5px;display:inline-block}
.card img{width:100%;height:100%}
.active{border:2px solid gold}
.disabled{opacity:0.3}
</style>
</head>

<body>

<h1>Draft</h1>
<div id="info"></div>
<div id="timer"></div>

<h2>P1</h2>
<div id="p1"></div>

<h2>P2</h2>
<div id="p2"></div>

<script>
const params = new URLSearchParams(location.search)
const room = params.get("room")

const socket = io({query:{room:room}})

let orders = [
["P1","P2","P2","P1","P1","P2","P2","P1","P1","P2"],
["P2","P1","P1","P2","P2","P1","P1","P2","P2","P1"],
["P1","P2","P1","P2","P1","P2","P1","P2","P1","P2"]
]

function img(n){
return `https://ddragon.leagueoflegends.com/cdn/13.24.1/img/champion/${n}.png`
}

socket.on("state", s=>{
let cur = orders[s.round-1][s.turn]

document.getElementById("info").innerText = cur+"のターン"
document.getElementById("timer").innerText = s.time

render("P1",s,cur)
render("P2",s,cur)
})

function render(p,s,cur){
let el = document.getElementById(p.toLowerCase())
el.innerHTML=""

s.packs[p].forEach(c=>{
let d=document.createElement("div")
d.className="card"

if(cur===p){
d.classList.add("active")
d.onclick=()=>socket.emit("pick",{champ:c})
}else{
d.classList.add("disabled")
}

d.innerHTML=`<img src="${img(c)}">`
el.appendChild(d)
})
}
</script>

</body>
</html>
