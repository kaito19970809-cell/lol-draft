<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LoL Draft</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
body {
    background:#0b0f1a;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

.pack {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card {
    border:1px solid #444;
    padding:10px;
    margin:5px;
    cursor:pointer;
    background:#111;
    transition:0.2s;
}
.card:hover { background:#333; }

.timer {
    font-size:30px;
    margin:10px;
}
</style>
</head>
<body>

<h2 id="role"></h2>
<div class="timer" id="timer">30</div>

<h3>パック</h3>
<div class="pack" id="pack"></div>

<h3>自分のピック</h3>
<div id="my"></div>

<h3>相手のピック</h3>
<div id="enemy"></div>

<audio id="sound" src="/static/pick.mp3"></audio>

<script>
const role = "{{role}}"
document.getElementById("role").innerText = role.toUpperCase()

const socket = io()

socket.on("state", s => {
    document.getElementById("timer").innerText = s.time

    const me = role === "blue" ? "P1" : "P2"
    const enemy = role === "blue" ? "P2" : "P1"

    const pack = document.getElementById("pack")
    pack.innerHTML = ""

    if(role !== "spec"){
        s.packs[me].forEach(c => {
            const div = document.createElement("div")
            div.className = "card"
            div.innerText = c
            div.onclick = () => {
                socket.emit("pick",{role:role, champ:c})
                document.getElementById("sound").play()
            }
            pack.appendChild(div)
        })
    }

    document.getElementById("my").innerText = s.picks[me].join(", ")
    document.getElementById("enemy").innerText = s.picks[enemy].join(", ")
})
</script>

</body>
</html>
