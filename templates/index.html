<!DOCTYPE html>
<html>
<head>
    <title>LoL Draft</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;">

<h1>LoL Draft</h1>

<div>ROLE: {{ role }}</div>
<div>ROUND: <span id="round"></span></div>
<div>TURN: <span id="turn"></span></div>
<div>TIME: <span id="timer"></span></div>

<h2>PACK</h2>
<div id="pack"></div>

<h2>P1</h2>
<div id="p1"></div>

<h2>P2</h2>
<div id="p2"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();
const ROLE = "{{ role }}";

function pick(champ) {
    socket.emit("pick", {
        role: ROLE,
        champ: champ
    });
}

function render(state) {
    document.getElementById("round").innerText = state.round;
    document.getElementById("turn").innerText = state.turn;
    document.getElementById("timer").innerText = state.time;

    // pack
    const packDiv = document.getElementById("pack");
    packDiv.innerHTML = "";
    state.pack.forEach(champ => {
        const btn = document.createElement("button");
        btn.innerText = champ;
        btn.onclick = () => pick(champ);
        packDiv.appendChild(btn);
    });

    // P1
    document.getElementById("p1").innerText = state.picks.P1.join(", ");

    // P2
    document.getElementById("p2").innerText = state.picks.P2.join(", ");
}

socket.on("state", (state) => {
    render(state);
});
</script>

</body>
</html>
